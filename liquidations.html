<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HYPE Liquidation Clusters</title>
        <meta name="theme-color" content="#09090b" />
        <script src="/theme.js"></script>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="stylesheet" href="/geist.css" />
        <link rel="stylesheet" href="/styles.css" />
        <script src="/liquidations.js" defer></script>
            <script src="/navbar.js" defer></script>
    </head>
    <body class="liquidations-page">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <hl-navbar></hl-navbar>

        <main class="layout">
            <section class="panel cluster-panel">
                <div class="panel-header">
                    <div>
                        <div class="cluster-heading">
                            <h2>Liquidation Distribution</h2>
                            <button
                                id="refresh-button"
                                class="cluster-refresh-button"
                                type="button"
                                aria-label="Refresh scan"
                                title="Refresh scan"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path
                                        d="M20 12a8 8 0 1 1-2.34-5.66M20 4v4h-4"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="1.8"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="controls">
                        <div class="segmented" id="side-toggle">
                            <button data-side="all" class="active">All</button>
                            <button data-side="long">Long</button>
                            <button data-side="short">Short</button>
                        </div>
                    </div>
                </div>

                <div class="chart-shell">
                    <div class="chart-meta">
                        <span class="pill" id="scan-status">Ready</span>
                        <span class="muted" id="price-range">--</span>
                    </div>
                    <div class="chart-area">
                        <div class="cluster-bars" id="cluster-bars"></div>
                        <div class="price-line" id="current-price-line">
                            <span id="current-price-label">--</span>
                        </div>
                    </div>
                    <div class="chart-axis" id="chart-axis"></div>
                </div>

                <div class="chart-legend">
                    <span class="legend-item"
                        ><span class="legend-swatch short"></span>Mostly
                        short</span
                    >
                    <span class="legend-item"
                        ><span class="legend-swatch long"></span>Mostly
                        long</span
                    >
                </div>

            </section>

            <aside class="panel detail-panel">
                <div class="detail-section">
                    <div class="section-header">
                        <h3>Top Buckets</h3>
                    </div>
                    <div class="table-wrap small">
                        <table>
                            <thead>
                                <tr>
                                    <th>Price Range</th>
                                    <th>Notional</th>
                                    <th>Positions</th>
                                </tr>
                            </thead>
                            <tbody id="bucket-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="section-header">
                        <h3>Scan Settings</h3>
                    </div>
                    <div class="range-control">
                        <div class="range-header">
                            <span>Top Accounts</span>
                            <span id="account-range-value" class="mono"
                                >5000</span
                            >
                        </div>
                        <input
                            id="account-range"
                            type="range"
                            min="100"
                            max="5000"
                            step="50"
                            value="5000"
                        />
                    </div>
                </div>

                <div class="detail-section">
                    <div class="cluster-summary-metrics">
                        <div class="metric">
                            <span class="label">Accounts</span>
                            <span id="accounts-count" class="value">0</span>
                        </div>
                        <div class="metric">
                            <span class="label">Liq Points</span>
                            <span id="points-count" class="value">0</span>
                        </div>
                        <div class="metric">
                            <span class="label">Notional</span>
                            <span id="total-notional" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Updated</span>
                            <span id="last-updated" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Current Price</span>
                            <span id="current-price" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Long Notional</span>
                            <span id="long-notional" class="value">--</span>
                        </div>
                        <div class="metric">
                            <span class="label">Short Notional</span>
                            <span id="short-notional" class="value">--</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

    </body>
</html>
